# Fraud Engine 2026 — production / VM deploy.
#
# Unlike docker-compose.yml (which BUILDS the image locally), this file PULLS
# the prebuilt image published to GHCR by the GitHub Actions workflow. Deploy is:
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# (or just run ./deploy.sh). Copy .env.dist to .env and fill it in first.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-game_integrity}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-game_integrity}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  fraud:
    image: ${FRAUD_IMAGE:-ghcr.io/madcat060/fraud-engine-2026:latest}
    command: ["python", "-m", "backend_v2.service_fraud"]
    environment:
      DEFAULT_DB_CONNECTION: ${DEFAULT_DB_CONNECTION:-postgresql+psycopg2://postgres:changeme@db:5432/game_integrity}
      PORT_FRAUD: "5001"
      PORT_REPORTS: "5000"
      REPORTS_SERVICE_URL: ${REPORTS_SERVICE_URL:-http://reports:5000}
    ports:
      - "${PORT_FRAUD:-5001}:5001"
    volumes:
      - uploads:/app/uploads
      - appdata:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  reports:
    image: ${FRAUD_IMAGE:-ghcr.io/madcat060/fraud-engine-2026:latest}
    command: ["python", "-m", "backend_v2.service_reports"]
    environment:
      DEFAULT_DB_CONNECTION: ${DEFAULT_DB_CONNECTION:-postgresql+psycopg2://postgres:changeme@db:5432/game_integrity}
      PORT_FRAUD: "5001"
      PORT_REPORTS: "5000"
    ports:
      - "${PORT_REPORTS:-5000}:5000"
    volumes:
      - uploads:/app/uploads
      - appdata:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  appdata:
